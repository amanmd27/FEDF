<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Attendance System</title>
<link rel="stylesheet" href="style.css">
<script src ="script.js"></script>
</head>
<body>
<div class="container">
<h1>Student Attendance System</h1>
<!-- Form Section -->
<div class="form">
<input type="number" id="id" placeholder="Student ID">
<input type="text" id="name" placeholder="Student Name">
<label for="status">Attendance Status:</label>
<select id="status" title="Select attendance status">
<option value="true">Present</option>
<option value="false">Absent</option>
</select>
<div class="btn-group">
<button onclick="addStudent()">Add</button>
<button onclick="updateStudent()">Update</button>
</div>
</div>
<!-- DOM vs VDOM Buttons -->
<div class="btn-group">
<button onclick="updateDOM()">Update Using DOM</button>
<button onclick="updateVDOM()">Update Using VDOM</button>
</div>
<!-- Table Section -->
<div class="table-container">
<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Attendance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableBody">
<!-- Data comes from script.js -->
</tbody>
</table>
</div>
</div>
